name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Разрешения для токена GitHub
permissions:
  contents: read
  pages: write
  id-token: write

# Блокировка параллельных запусков (если ты быстро сделаешь два пуша подряд)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Задача 1: Только сборка кода
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # Задача 2: Только публикация (ждет завершения сборки)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4